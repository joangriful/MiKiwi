<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI.KIWI | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Cinzel', 'serif'],
                    },
                    colors: {
                        mikiwi: {
                            dark: '#1a1a1a',
                            lime: '#a3e635',
                            cream: '#faf8f5',
                        }
                    },
                    letterSpacing: {
                        'super-wide': '0.25em',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #faf8f5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Glows azul/violeta en los bordes - estilo MiKiwi */
        .glow-left {
            position: fixed;
            top: 0;
            left: 0;
            width: 25%;
            height: 100%;
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.25) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .glow-right {
            position: fixed;
            top: 0;
            right: 0;
            width: 25%;
            height: 100%;
            background: linear-gradient(-90deg, rgba(99, 102, 241, 0.25) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .glow-top {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(180deg, rgba(99, 102, 241, 0.15) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        .glow-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(0deg, rgba(99, 102, 241, 0.15) 0%, transparent 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* Tipografía estilo MiKiwi - títulos gruesos */
        .title-mikiwi {
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        /* Botón primario estilo MiKiwi */
        .btn-primary {
            background-color: #1a1a1a;
            color: white;
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .btn-primary:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        /* Botón secundario (outlined) */
        .btn-secondary {
            background-color: transparent;
            border: 1.5px solid #1a1a1a;
            color: #1a1a1a;
            transition: all 0.3s ease;
            letter-spacing: 0.1em;
        }

        .btn-secondary:hover {
            background-color: #1a1a1a;
            color: white;
        }

        /* Links con subrayado verde lima */
        .link-mikiwi {
            color: #1a1a1a;
            position: relative;
            transition: all 0.2s ease;
        }

        .link-mikiwi::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #a3e635;
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .link-mikiwi:hover::after {
            transform: scaleX(1);
        }

        /* Input styling minimalista */
        .input-field {
            background: transparent;
            border-bottom: 1.5px solid #d1d5db;
            transition: all 0.3s ease;
            border-radius: 0;
        }

        .input-field:focus {
            border-bottom-color: #1a1a1a;
            outline: none;
        }

        .input-field::placeholder {
            color: #9ca3af;
            letter-spacing: 0.05em;
        }

        /* Label estilo */
        .label-mikiwi {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #6b7280;
        }
    </style>
</head>

<body class="antialiased flex flex-col min-h-screen">

    <!-- Glows de fondo -->
    <div class="glow-left"></div>
    <div class="glow-right"></div>
    <div class="glow-top"></div>
    <div class="glow-bottom"></div>

    <!-- Header/Nav estilo MiKiwi -->
    <nav class="fixed top-0 w-full z-50 px-6 md:px-12 py-6 flex justify-between items-center">
        <a href="/" class="font-display text-lg tracking-wide text-mikiwi-dark">MI.KIWI</a>
        <div class="flex items-center gap-6 text-xs font-medium tracking-super-wide uppercase">
            <a href="#" class="link-mikiwi">Buscar</a>
            <a href="register.html" class="bg-mikiwi-dark text-white px-5 py-2.5">Empezar</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="relative z-10 flex-grow flex items-center justify-center px-6 py-24">
        <div class="w-full max-w-sm">

            <!-- Subtítulo -->
            <p class="text-xs tracking-super-wide uppercase text-gray-500 mb-4 text-center">
                Acceso a tu cuenta
            </p>

            <!-- Título principal estilo MiKiwi -->
            <h1 class="title-mikiwi text-4xl md:text-5xl text-center mb-4 text-mikiwi-dark">
                Iniciar Sesión.
            </h1>

            <!-- Descripción -->
            <p class="text-gray-600 text-center mb-12 leading-relaxed">
                Accede a tu perfil sensorial personalizado y continúa tu experiencia MI.KIWI.
            </p>

            <!-- Login Form -->
            <form class="space-y-8">
                <!-- Email -->
                <div>
                    <label for="email" class="label-mikiwi block mb-3">
                        Correo Electrónico
                    </label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com"
                        class="input-field w-full py-3 text-mikiwi-dark" required>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="label-mikiwi block mb-3">
                        Contraseña
                    </label>
                    <input type="password" id="password" name="password" placeholder="••••••••"
                        class="input-field w-full py-3 text-mikiwi-dark" required>
                </div>

                <!-- Forgot Password -->
                <div class="flex justify-end">
                    <a href="#" class="link-mikiwi text-xs tracking-wide uppercase font-medium">
                        Recuperar Contraseña
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit"
                    class="btn-primary w-full py-4 text-xs uppercase font-semibold tracking-super-wide">
                    Acceder
                </button>

                <!-- Register Button -->
                <button type="button"
                    class="btn-secondary w-full py-4 text-xs uppercase font-semibold tracking-super-wide">
                    Crear Nueva Cuenta
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-10">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center">
                    <span class="px-4 bg-mikiwi-cream text-xs tracking-super-wide uppercase text-gray-400">o</span>
                </div>
            </div>

            <!-- Social Login -->
            <div class="space-y-4">
                <button type="button" class="btn-secondary w-full py-4 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="#1a1a1a"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="#1a1a1a"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="#1a1a1a"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                        <path fill="#1a1a1a"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                    </svg>
                    <span class="text-xs uppercase font-semibold tracking-super-wide">Continuar con Google</span>
                </button>
                <button type="button" class="btn-secondary w-full py-4 flex items-center justify-center gap-3">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701" />
                    </svg>
                    <span class="text-xs uppercase font-semibold tracking-super-wide">Continuar con Apple</span>
                </button>
            </div>

        </div>
    </main>

    <!-- Footer -->
    <footer class="relative z-10 text-center py-8">
        <p class="text-xs tracking-super-wide uppercase text-gray-400">
            Al acceder, aceptas nuestros
            <a href="#" class="link-mikiwi">Términos</a>
            y
            <a href="#" class="link-mikiwi">Privacidad</a>
        </p>
    </footer>

</body>

</html>
