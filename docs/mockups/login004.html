<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI.KIWI | Portal de Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --color-cream: #faf8f5;
            --color-dark: #1a1a1a;
            --color-indigo: #6366f1;
            --color-lime: #a3e635;
            --color-purple: #8b5cf6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background: var(--color-cream);
            color: var(--color-dark);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* =============== BACKGROUND - MINIMAL GRADIENT =============== */
        .bg-gradient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(163, 230, 53, 0.05) 0%, transparent 50%);
        }

        /* =============== FLOATING ORBS (SIMPLIFIED) =============== */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.12);
            top: -5%;
            left: -5%;
            animation: float1 30s ease-in-out infinite;
        }

        .orb-2 {
            width: 280px;
            height: 280px;
            background: rgba(163, 230, 53, 0.1);
            bottom: -10%;
            right: -5%;
            animation: float2 35s ease-in-out infinite;
        }

        @keyframes float1 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(3%, 3%);
            }
        }

        @keyframes float2 {

            0%,
            100% {
                transform: translate(0, 0);
            }

            50% {
                transform: translate(-3%, -3%);
            }
        }

        /* =============== MAIN CARD =============== */
        .auth-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(26, 26, 26, 0.06);
            border-radius: 24px;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.1);
        }

        /* =============== TAB NAVIGATION =============== */
        .tab-nav {
            display: flex;
            background: rgba(26, 26, 26, 0.03);
            border-radius: 16px;
            padding: 6px;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 14px 24px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.5);
            border-radius: 12px;
            transition: color 0.5s ease;
            position: relative;
            z-index: 2;
        }

        .tab-btn.active {
            color: var(--color-dark);
        }

        .tab-slider {
            position: absolute;
            top: 6px;
            left: 6px;
            width: calc(50% - 6px);
            height: calc(100% - 12px);
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            z-index: 1;
        }

        .tab-slider.register {
            transform: translateX(100%);
        }

        /* =============== FORM PANELS - CROSSFADE =============== */
        .form-container {
            position: relative;
            min-height: 440px;
        }

        .form-panel {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .form-panel.active {
            opacity: 1;
            visibility: visible;
            position: relative;
        }

        /* =============== HEADER ANIMATION =============== */
        .form-header {
            overflow: hidden;
        }

        .form-title {
            font-weight: 900;
            font-size: clamp(1.75rem, 4vw, 2.25rem);
            letter-spacing: -0.02em;
            line-height: 1.1;
            background: linear-gradient(135deg, var(--color-dark) 0%, #444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-subtitle {
            color: rgba(26, 26, 26, 0.5);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* =============== INPUTS WITH ANIMATED LABELS =============== */
        .input-group {
            position: relative;
        }

        .input-field {
            width: 100%;
            padding: 18px 16px 8px;
            font-size: 0.95rem;
            background: rgba(26, 26, 26, 0.02);
            border: 1.5px solid rgba(26, 26, 26, 0.08);
            border-radius: 14px;
            outline: none;
            transition:
                border-color 0.4s ease,
                background-color 0.4s ease,
                box-shadow 0.4s ease;
        }

        .input-field:focus {
            border-color: var(--color-indigo);
            background: white;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.08);
        }

        .input-field.lime:focus {
            border-color: var(--color-lime);
            box-shadow: 0 0 0 4px rgba(163, 230, 53, 0.12);
        }

        .input-label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            color: rgba(26, 26, 26, 0.4);
            pointer-events: none;
            transition:
                top 0.3s ease,
                font-size 0.3s ease,
                color 0.3s ease;
        }

        .input-field:focus+.input-label,
        .input-field:not(:placeholder-shown)+.input-label {
            top: 12px;
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-indigo);
        }

        .input-field.lime:focus+.input-label {
            color: #65a30d;
        }

        /* =============== BUTTONS =============== */
        .btn-primary {
            width: 100%;
            padding: 16px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: white;
            background: linear-gradient(135deg, var(--color-dark) 0%, #333 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition:
                transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94),
                box-shadow 0.5s ease;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #333 0%, #555 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(26, 26, 26, 0.2);
        }

        .btn-primary:hover::before {
            opacity: 1;
        }

        .btn-primary span {
            position: relative;
            z-index: 1;
        }

        .btn-lime {
            background: linear-gradient(135deg, var(--color-lime) 0%, #84cc16 100%);
            color: var(--color-dark);
        }

        .btn-lime:hover {
            box-shadow: 0 15px 35px rgba(163, 230, 53, 0.25);
        }

        .btn-lime::before {
            background: linear-gradient(135deg, #84cc16 0%, #65a30d 100%);
        }

        /* =============== SOCIAL BUTTONS =============== */
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.8);
            border: 1.5px solid rgba(26, 26, 26, 0.08);
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--color-dark);
            cursor: pointer;
            transition:
                transform 0.4s ease,
                border-color 0.3s ease,
                box-shadow 0.4s ease;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(26, 26, 26, 0.15);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
        }

        /* =============== DIVIDER =============== */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(26, 26, 26, 0.1), transparent);
        }

        .divider span {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.35);
        }

        /* =============== LINKS =============== */
        .link {
            color: rgba(26, 26, 26, 0.6);
            font-size: 0.8rem;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .link:hover {
            color: var(--color-dark);
        }

        .link-accent {
            color: var(--color-indigo);
            font-weight: 600;
        }

        .link-accent:hover {
            color: #4f46e5;
        }

        /* =============== SONIC ICON =============== */
        .sonic-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 24px;
            position: relative;
        }

        .sonic-icon::before,
        .sonic-icon::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1.5px solid;
            animation: sonic-pulse 4s ease-in-out infinite;
        }

        .sonic-icon::before {
            inset: 0;
            border-color: rgba(99, 102, 241, 0.4);
        }

        .sonic-icon::after {
            inset: 8px;
            border-color: rgba(163, 230, 53, 0.5);
            animation-delay: 1s;
        }

        .sonic-icon-core {
            position: absolute;
            inset: 18px;
            background: linear-gradient(135deg, var(--color-dark), #444);
            border-radius: 50%;
        }

        @keyframes sonic-pulse {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.05);
                opacity: 0.7;
            }
        }

        /* =============== FOOTER BRANDING =============== */
        .footer-brand {
            text-align: center;
            padding-top: 32px;
        }

        .footer-brand p {
            font-size: 0.65rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(26, 26, 26, 0.3);
        }

        /* =============== RESPONSIVE =============== */
        @media (max-width: 480px) {
            .auth-card {
                border-radius: 20px;
            }

            .form-container {
                min-height: 400px;
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Background gradient -->
    <div class="bg-gradient"></div>

    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <!-- Header -->
    <header class="fixed top-0 w-full z-50 px-6 py-5 flex justify-between items-center">
        <a href="/"
            class="font-display text-lg tracking-wide hover:opacity-70 transition-opacity duration-300">MI.KIWI</a>
        <a href="/"
            class="text-[0.7rem] uppercase tracking-[0.15em] font-medium opacity-50 hover:opacity-100 transition-opacity">
            Volver al inicio
        </a>
    </header>

    <!-- Main Card -->
    <main class="perspective-container relative z-10 w-full max-w-md">

            <nav class="tab-nav mb-8">

                <button class="tab-btn" id="tabRegister" onclick="showRegister()">Registro</button>
            </nav>

            <!-- Forms Container -->
            <div class="form-container">

                    <form class="space-y-5">

                            <input type="email" class="input-field" placeholder=" " required>
                            <label class="input-label">Correo electrónico</label>
                        </div>

                        <div class="input-group">
                            <input type="password" class="input-field" placeholder=" " required>
                            <label class="input-label">Contraseña</label>
                        </div>

                        <div class="flex items-center justify-between">

                                <input type="checkbox"

                            <a href="#" class="link text-xs">¿Olvidaste tu contraseña?</a>
                        </div>

                        <button type="submit" class="btn-primary">
                            <span>Acceder</span>

                    </form>

                    <div class="divider my-6">
                        <span>o continúa con</span>
                    </div>

                    <div class="flex gap-3">
                        <button class="social-btn">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />

                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                            Google
                        </button>
                        <button class="social-btn">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701" />
                            </svg>
                            Apple
                        </button>
                    </div>
                </div>

                <!-- REGISTER FORM -->
                <div class="form-panel" id="registerPanel">
                    <div class="form-header mb-6">
                        <h1 class="form-title mb-2">Crea tu identidad</h1>
                        <p class="form-subtitle">Descubre tu huella sónica única</p>
                    </div>

                    <form class="space-y-4">
                        <div class="input-group">
                            <input type="text" class="input-field lime" placeholder=" " required>
                            <label class="input-label">Nombre completo</label>
                        </div>

                        <div class="input-group">
                            <input type="email" class="input-field lime" placeholder=" " required>
                            <label class="input-label">Correo electrónico</label>
                        </div>

                        <div class="input-group">
                            <input type="password" class="input-field lime" placeholder=" " required>
                            <label class="input-label">Contraseña</label>
                        </div>

                        <button type="submit" class="btn-primary btn-lime">
                            <span>Crear cuenta</span>
                        </button>
                    </form>

                    <div class="divider my-5">
                        <span>o regístrate con</span>
                    </div>

                    <div class="flex gap-3">
                        <button class="social-btn">
                            <svg class="w-5 h-5" viewBox="0 0 24 24">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />

                            </svg>
                            Google
                        </button>
                        <button class="social-btn">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                <path
                                    d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701" />
                            </svg>
                            Apple
                        </button>
                    </div>

                    <p class="text-center text-[0.7rem] text-gray-400 mt-5 leading-relaxed">
                        Al registrarte, aceptas nuestros
                        <a href="#" class="link-accent">Términos</a> y
                        <a href="#" class="link-accent">Privacidad</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Footer branding -->
        <div class="footer-brand">
            <p>Identidad sónica personalizada</p>
        </div>
    </main>

    <script>
        const tabSlider = document.getElementById('tabSlider');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const loginPanel = document.getElementById('loginPanel');
        const registerPanel = document.getElementById('registerPanel');

        function showLogin() {
            // Update tabs
            tabSlider.classList.remove('register');
            tabLogin.classList.add('active');
            tabRegister.classList.remove('active');

            // Switch panels - simple crossfade
            loginPanel.classList.add('active');
            registerPanel.classList.remove('active');
        }

        function showRegister() {
            // Update tabs
            tabSlider.classList.add('register');
            tabRegister.classList.add('active');
            tabLogin.classList.remove('active');

            // Switch panels - simple crossfade
            registerPanel.classList.add('active');
            loginPanel.classList.remove('active');
        }
    </script>

</body>

</html>
